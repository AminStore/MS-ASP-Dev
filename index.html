    <link rel="manifest" href="/manifest.json" />

    <!--
      ── LCP Preload ──
      Preloading the hero image here — before React even boots — is the single
      biggest LCP win. The browser starts fetching MS.jpg in parallel with the
      JS bundle, shaving hundreds of milliseconds from Largest Contentful Paint.
    -->
    <link
      rel="preload"
      as="image"
      href="/MS.jpg"
      fetchpriority="high"
    />

    <!--
      ── DNS Prefetch ──
      Warm up DNS for external origins that appear in visible content.
      Costs nothing, saves ~50-300 ms on first connection to each host.
    -->
    <link rel="dns-prefetch" href="https://github.com" />
    <link rel="dns-prefetch" href="https://linkedin.com" />
    <link rel="dns-prefetch" href="https://wa.me" />

    <!--
      ── Font Loading Strategy ──
      Using Google Fonts API with font-display=block to prevent FOUT:
      - block: Browser waits up to 3s for custom font, shows fallback after
      - Prevents flashing between system fonts and custom fonts
      - Preconnect ensures faster delivery to Google's servers
      Fonts are loaded together through Google API (single request):
      - EN: Geo (headings), Homenaje (body), Work Sans (UI)
      - AR: Cairo (all text), Work Sans (UI)
      The API handles all @font-face declarations and URL management dynamically.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Single Google Fonts API request with all required fonts and weights -->
    <link
      href="https://fonts.googleapis.com/css2?family=Geo:ital@0;1&family=Homenaje&family=Work+Sans:wght@300;400;500&family=Cairo:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
