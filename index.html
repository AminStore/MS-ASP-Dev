    <!-- ── Icons & PWA ── -->

    <link rel="apple-touch-icon" href="/favicon.svg?v=3" />
    <link rel="manifest" href="/manifest.json" />

    <!--
      ── LCP Preload ──
      Preloading the hero image here — before React even boots — is the single
      biggest LCP win. The browser starts fetching MS.jpg in parallel with the
      JS bundle, shaving hundreds of milliseconds from Largest Contentful Paint.
    -->
    <link
      rel="preload"
      as="image"
      href="/MS.jpg"
      fetchpriority="high"
    />

    <!--
      ── DNS Prefetch ──
      Warm up DNS for external origins that appear in visible content.
      Costs nothing, saves ~50-300 ms on first connection to each host.
    -->
    <link rel="dns-prefetch" href="https://github.com" />
    <link rel="dns-prefetch" href="https://linkedin.com" />
    <link rel="dns-prefetch" href="https://wa.me" />

    <!--
      ── Font Loading Strategy ──
      EN: Geo (headings), Homenaje (body/labels), Work Sans (UI)
      AR: Cairo (all text, self-hosted for offline/speed)
      font-display=swap prevents invisible text while fonts load.
    -->
    <link rel="preload" href="/fonts/cairo-arabic.woff2" as="font" type="font/woff2" crossorigin />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- English fonts — Cairo is served locally via @font-face in styles.css -->
    <link
      href="https://fonts.googleapis.com/css2?family=Geo:ital@0;1&family=Homenaje&family=Work+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
