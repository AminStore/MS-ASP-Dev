    <!-- ── Icons & PWA ── -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!--
      ── LCP Preload ──
      Preloading the hero image here — before React even boots — is the single
      biggest LCP win. The browser starts fetching MS.jpg in parallel with the
      JS bundle, shaving hundreds of milliseconds from Largest Contentful Paint.
    -->
    <link
      rel="preload"
      as="image"
      href="/MS.jpg"
      fetchpriority="high"
    />

    <!--
      ── DNS Prefetch ──
      Warm up DNS for external origins that appear in visible content.
      Costs nothing, saves ~50-300 ms on first connection to each host.
    -->
    <link rel="dns-prefetch" href="https://github.com" />
    <link rel="dns-prefetch" href="https://linkedin.com" />
    <link rel="dns-prefetch" href="https://wa.me" />

    <!--
      ── Fonts ──
      1. preconnect opens the TCP + TLS handshake to Google's servers before
         the stylesheet is even requested.
      2. The stylesheet is loaded with media="print" so it is non-render-blocking.
         onload switches it to media="all" once it arrives.
      3. The <noscript> fallback loads the fonts normally for no-JS environments.
      font-display=swap is embedded in the URL so text stays visible during load.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      id="google-fonts"
      href="https://fonts.googleapis.com/css2?family=Jim+Nightshade&family=Italianno&family=Work+Sans:wght@300;400;500&family=Tajawal:wght@300;400;500&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Jim+Nightshade&family=Italianno&family=Work+Sans:wght@300;400;500&family=Tajawal:wght@300;400;500&display=swap"
        rel="stylesheet"
      />
    </noscript>
