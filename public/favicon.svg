<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .bg { fill: #f5f3ee; }
      .icon { fill: #0d0d0d; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #1a1a1a; }
        .icon { fill: #f5f3ee; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="100" height="100"/>
  
  <!-- Curly braces with slash - represents code -->
  <!-- Left brace { -->
  <path class="icon" d="M 28 30 Q 20 30 20 40 L 20 50 Q 20 60 28 60" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Right brace } -->
  <path class="icon" d="M 72 30 Q 80 30 80 40 L 80 50 Q 80 60 72 60" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Center slash -->
  <line class="icon" x1="40" y1="25" x2="60" y2="75" stroke-width="5" stroke-linecap="round"/>
</svg>
