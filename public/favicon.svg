<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jim+Nightshade&display=swap');
      
      /* Light theme (default) - Paper & Ink design system */
      .background-light { fill: #f5f3ee; }
      .border-light { stroke: #e8e5da; }
      .symbol-light { fill: #0d0d0d; }
      
      /* Dark theme */
      @media (prefers-color-scheme: dark) {
        .background-light { fill: #1a1a1a; }
        .border-light { stroke: #2a2a2a; }
        .symbol-light { fill: #f5f3ee; }
      }
      
      .symbol {
        font-family: 'Jim Nightshade', cursive;
        font-size: 70px;
        font-weight: 400;
        text-anchor: middle;
        dominant-baseline: middle;
      }
    </style>
  </defs>
  <!-- Background -->
  <rect class="background-light" width="100" height="100"/>
  <!-- Decorative border - subtle, matches theme -->
  <rect class="background-light" width="100" height="100" rx="0" fill="none" class="border-light" stroke-width="1"/>
  <!-- Symbol matching app's decorative element -->
  <text class="symbol symbol-light" x="50" y="50">✦</text>
</svg>
